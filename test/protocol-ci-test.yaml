# test case yaml file is only visible to the `run_test.py`
host:
  image:
    name: default
    presets: predefined.node_config.yaml
  env:
    - ENV_BATS_XXX_INTERVAL: "100"

tests:
  test1:
    description: "Test protocol throughput/rtt on single hop"
    topology:
      config_name: linear_network_1
      config_file: predefined.topology.yaml
    target_protocols: [btp, brtp, brtp_proxy]
    route: static_bfs
    test_tools:
      iperf:
        interval: 1
        interval_num: 10
        packet_type: tcp
        client_host: 0
        server_host: 1
  test2:
    description: "Test protocol throughput/rtt on single hop"
    topology:
      config_name: linear_network_1
      config_file: predefined.topology.yaml
    target_protocols: [tcp-bbr, kcp]
    route: static_route
    test_tools:
      iperf:
        interval: 1
        interval_num: 10
        packet_type: tcp
        client_host: 0
        server_host: 1
    execution_mode: parallel # parallel or serial
  test3:
    description: "Test BRTP/BTP"
    topology:
      config_name: path2-p0-p1
      config_file: predefined.topology.yaml
    target_protocols: [brtp-next, btp-next]
    allow_failure: true
    route: static_bfs
    test_tools:
      bats_iperf:
        interval: 1
        interval_num: 20
        client_host: 0
        server_host: 3
