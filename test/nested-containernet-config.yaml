containernet:
  default:
    image: containernet:22.04
    privileged: true
    network_mode: "host"
    mounts:
      - "/var/run/docker.sock:/var/run/docker.sock"
  ubuntu-22.04:
    image: containernet:22.04
    privileged: true
    network_mode: "host"
    mounts:
      - "/var/run/docker.sock:/var/run/docker.sock"
  ubuntu-24.04:
    image: containernet:24.04
    privileged: true
    network_mode: "host"
    mounts:
      - "/var/run/docker.sock:/var/run/docker.sock"
  customized_example: # An example of a customized Containernet image configuration.
    image: your-registry.example.com/containernet:custom-tag # <-- Replace with your custom image
    privileged: true
    containernet_repo_from_user: true # If true, will mount `containernet_repo_path`.
    containernet_repo_path: "/home/{user_name}/workspace/containernet"
    network_mode: "host"
    mounts:
      - "/var/run/docker.sock:/var/run/docker.sock"
