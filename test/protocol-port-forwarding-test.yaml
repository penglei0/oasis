# test case yaml file is only visible to the `run_test.py`
host:
  image:
    name: default
    presets: predefined.node_config.yaml

tests:
  test1:
    description: "Test protocol port forwarding on ABC"
    topology:
      config_name: A_B_C
      config_file: predefined.topology.yaml
    target_protocols: [tcp-bbr]
    route: static_bfs
    test_tools:
      iperf:
        interval: 1
        interval_num: 10
        packet_type: tcp
        client_host: 0
        server_host: 1
    execution_mode: parallel
