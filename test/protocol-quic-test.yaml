host:
  image:
    name: default
    presets: predefined.node_config.yaml

tests:
  test1:
    description: "Test QUIC"
    topology:
      config_name: path2-p0-p1
      config_file: predefined.topology.yaml
    target_protocols: [quic-stream, quic-datagram]
    route: static_bfs
    test_tools:
      quic_iperf:
        interval: 1
        interval_num: 10
        packet_type: tcp
        client_host: 0
        server_host: 1
        server_host: 3
