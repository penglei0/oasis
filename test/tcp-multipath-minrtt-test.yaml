host:
  image:
    name: default
    presets: predefined.node_config.yaml

tests:
  test_minrtt002:
    description: "Test tcp"
    topology:
      config_name: path2-p0-p1
      config_file: predefined.topology.yaml
    target_protocols: [tcp-bbr]
    route: static_bfs
    test_tools:
      iperf:
        interval: 1
        interval_num: 10
        client_host: 0
        server_host: 3
        multipath: true
  test_minrtt004:
    description: "Test QUIC"
    topology:
      config_name: path2-p1-p1
      config_file: predefined.topology.yaml
    target_protocols: [tcp-bbr]
    route: static_bfs
    test_tools:
      iperf:
        interval: 1
        interval_num: 10
        client_host: 0
        server_host: 3
        multipath: true
