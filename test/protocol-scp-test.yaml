# test case yaml file is only visible to the `run_test.py`
host:
  image:
    name: default
    presets: predefined.node_config.yaml
  init_script: init_node.sh
  env:
    - ENV_BATS_XXX_INTERVAL: "100"

tests:
  test10:
    description: "Test scp with multiple files"
    topology:
      config_name: linear_network_1
      config_file: predefined.topology.yaml
    target_protocols: [tcp-bbr]
    route: static_route
    test_tools:
      scp:
        client_host: 0
        server_host: 1
