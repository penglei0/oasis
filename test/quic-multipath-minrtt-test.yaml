host:
  image:
    name: default
    presets: predefined.node_config.yaml
  env:
    - QUIC_MP_SCHEDULER: "minrtt"

tests:
  test_minrtt002:
    description: "Test QUIC"
    topology:
      config_name: path2-p0-p1
      config_file: predefined.topology.yaml
    target_protocols: [quic-stream]
    route: static_bfs
    test_tools:
      quic_perf:
        interval: 1
        interval_num: 20
        client_host: 0
        server_host: 3
        multipath: true
  test_minrtt004:
    description: "Test QUIC"
    topology:
      config_name: path2-p1-p1
      config_file: predefined.topology.yaml
    target_protocols: [quic-stream]
    route: static_bfs
    test_tools:
      quic_perf:
        interval: 1
        interval_num: 20
        client_host: 0
        server_host: 3
        multipath: true
