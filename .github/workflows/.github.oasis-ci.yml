name: Oasis CI
on:
  pull_request:
    branches: ["main", "dev"]
    types:
      - opened
      - synchronize
      - ready_for_review
    paths-ignore:
      - "**.md"
      - "**.json"
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "**.md"
      - "**.json"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  oasis-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        containernet:
          - name: ubuntu-22.04
            tag: containernet:22.04
            ubuntu_version: "22.04"
          - name: ubuntu-24.04
            tag: containernet:24.04
            ubuntu_version: "24.04"
        host:
          - name: ubuntu-22.04
            tag: ubuntu-generic:22.04
            ubuntu_version: "22.04"
          - name: ubuntu-24.04
            tag: ubuntu-generic:24.04
            ubuntu_version: "24.04"
    name: Oasis CI (${{ matrix.containernet.ubuntu_version }} nested / ${{ matrix.host.ubuntu_version }} host)
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true
          submodules: recursive
      - name: sync git-lfs
        run: git lfs install && git lfs pull
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10.14"
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r ${{github.workspace}}/docker/requirements/containernet.txt
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull Docker Images
        working-directory: ${{github.workspace}}/
        run: |
          set -e
          pull_and_tag() {
            remote_image="$1"
            local_image="$2"
            if ! docker pull "${remote_image}"; then
              echo "Required image ${remote_image} was not found in GHCR."
              echo "Workflow .github/workflows/.github.publish-docker.yml must run successfully for a release tag like v1.0.0 before Oasis CI can use ${local_image}."
              exit 1
            fi
            docker tag "${remote_image}" "${local_image}"
          }

          pull_and_tag ghcr.io/${{ github.repository }}/containernet:${{ matrix.containernet.ubuntu_version }} ${{ matrix.containernet.tag }}
          pull_and_tag ghcr.io/${{ github.repository }}/ubuntu-generic:${{ matrix.host.ubuntu_version }} ${{ matrix.host.tag }}
          docker images
      - name: Loading secrets
        run: |
          echo "Hardware_info=${{secrets.BATS_HARDWARE_INFO}}" >> ${{github.workspace}}/test/rootfs/etc/cfg/licence
          echo "Licence_id=${{secrets.BATS_LICENCE_ID}}" >> ${{github.workspace}}/test/rootfs/etc/cfg/licence
      - name: SSHPing tests
        working-directory: ${{github.workspace}}/
        run: |
          ./src/tools/run_test.sh protocol-sshping-test.yaml --cleanup --no-privilege --containernet=${{ matrix.containernet.name }} --host=${{ matrix.host.name }}
      - name: SCP test
        working-directory: ${{github.workspace}}/
        run: |
          ./src/tools/run_test.sh protocol-scp-test.yaml --cleanup --no-privilege --containernet=${{ matrix.containernet.name }} --host=${{ matrix.host.name }}
      - name: Throughput tests
        working-directory: ${{github.workspace}}/
        run: |
          ./src/tools/run_test.sh protocol-ci-test.yaml --cleanup --no-privilege --containernet=${{ matrix.containernet.name }} --host=${{ matrix.host.name }}
      - name: Upload test logs
        uses: actions/upload-artifact@v6
        continue-on-error: true
        with:
          name: ci-test-logs-${{ matrix.containernet.ubuntu_version }}-${{ matrix.host.ubuntu_version }}
          path: |
            ${{github.workspace}}/test_results/**
          retention-days: 1
