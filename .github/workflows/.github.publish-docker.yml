name: Publish Docker Images

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  validate-release-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Validate release tag
        id: validate
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported release tag: ${GITHUB_REF_NAME}"
            exit 1
          fi

          git fetch --no-tags --depth=1 origin main dev
          tag_commit=$(git rev-list -n 1 "${GITHUB_REF_NAME}")

          for branch in main dev; do
            if git merge-base --is-ancestor "${tag_commit}" "origin/${branch}"; then
              echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          done

          echo "Release tags must point to a commit on a protected branch."
          exit 1

  publish-images:
    needs: validate-release-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: containernet
            dockerfile: Dockerfile.containernet
            ubuntu_version: "22.04"
          - image_name: containernet
            dockerfile: Dockerfile.containernet
            ubuntu_version: "24.04"
          - image_name: ubuntu-generic
            dockerfile: Dockerfile.ubuntu-generic
            ubuntu_version: "22.04"
          - image_name: ubuntu-generic
            dockerfile: Dockerfile.ubuntu-generic
            ubuntu_version: "24.04"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true
          submodules: recursive
      - name: sync git-lfs
        run: git lfs install && git lfs pull
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu_version }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image_name }}:${{ matrix.ubuntu_version }}
            ghcr.io/${{ github.repository }}/${{ matrix.image_name }}:${{ needs.validate-release-tag.outputs.version }}-${{ matrix.ubuntu_version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.validate-release-tag.outputs.version }}
